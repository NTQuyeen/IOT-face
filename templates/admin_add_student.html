<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Thêm nhân viên</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
<div class="top-bar">
  <h2>💼 QUẢN LÝ NHÂN SỰ</h2>
  <div class="nav">
    <a href="/attendance" class="nav-btn">📋 Bảng công</a>
    <a href="/admin/students" class="nav-btn">👥 Nhân viên</a>
    <a href="/logout" class="logout">Thoát</a>
  </div>
</div>

<h1>➕ Đăng ký nhân viên mới</h1>

<div class="card">
  <p style="color:#666;font-size:14px;">Lưu ý: Tải lên ít nhất 5 ảnh rõ mặt để đạt độ chính xác cao nhất.</p>

  <form method="post" enctype="multipart/form-data">
    <label>Họ và tên nhân viên:</label>
    <input name="name" placeholder="Ví dụ: Nguyễn Văn A" required>

    <label>Mã thẻ (UID RFID):</label>
    <input name="uid" id="uid" placeholder="Bấm 'Quét thẻ' rồi quét thẻ" required readonly>

    <button type="button" id="scanBtn" style="margin-bottom:10px;width:100%;">📡 Quét thẻ</button>
    <div id="scanStatus" style="font-size:13px;color:#666;margin-bottom:15px;"></div>

    <label style="margin-top:15px;display:block;">Chọn bộ ảnh mẫu:</label>
    <input type="file" name="images" multiple required>

    <button type="submit" style="margin-top:20px;width:100%;">🚀 Hoàn tất đăng ký</button>
  </form>

  {% if error %}
  <div style="margin-top:20px;padding:10px;background:#fee2e2;color:#991b1b;border-radius:8px;">{{ error }}</div>
  {% endif %}

  {% if success %}
  <div style="margin-top:20px;padding:10px;background:#e6fffa;color:#2c7a7b;border-radius:8px;">{{ success }}</div>
  {% endif %}
</div>

<script>
const btn = document.getElementById("scanBtn");
const uidInput = document.getElementById("uid");
const statusBox = document.getElementById("scanStatus");

let timer = null;

async function armScan() {
  const body = new URLSearchParams();
  body.set("seconds", "20");

  const res = await fetch("/admin/rfid/arm", {
    method: "POST",
    body,
    credentials: "include"
  });

  return res.json();
}

async function pollUID(armedAt) {
  const res = await fetch("/admin/rfid/latest", { credentials: "include" });
  const data = await res.json();

  if (data.status === "success" && data.uid && data.ts >= armedAt) {
    uidInput.value = data.uid;
    statusBox.textContent = "✅ Đã nhận UID: " + data.uid;
    clearInterval(timer);
    timer = null;
  }
}

btn.addEventListener("click", async () => {
  uidInput.value = "";
  statusBox.textContent = "⏳ Đang chờ quét thẻ...";

  try {
    const arm = await armScan();
    if (arm.status !== "success") {
      statusBox.textContent = "❌ Không ARM được (chưa login hoặc cookie lỗi)";
      return;
    }

    const armedAt = arm.armed_at;

    if (timer) clearInterval(timer);
    timer = setInterval(() => pollUID(armedAt), 400);

    setTimeout(() => {
      if (timer) {
        clearInterval(timer);
        timer = null;
        statusBox.textContent = "⚠️ Hết thời gian chờ. Bấm Quét thẻ và thử lại.";
      }
    }, 20000);
  } catch (e) {
    statusBox.textContent = "❌ Lỗi kết nối server";
    console.error(e);
  }
});
</script>
</body>
</html>
