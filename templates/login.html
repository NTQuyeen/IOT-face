<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Công ty</title>
  <style>
    body {
      margin: 0; height: 100vh;
      background: #102a43;
      display: flex; justify-content: center; align-items: center;
      font-family: sans-serif;
    }
    .login-box {
      width: 350px; background: #fff; padding: 40px;
      border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h2 { text-align: center; color: #102a43; margin-bottom: 30px; }
    input {
      width: 100%; padding: 12px; margin-bottom: 15px;
      border: 1px solid #bcccdc; border-radius: 6px; box-sizing: border-box;
    }
    button {
      width: 100%; padding: 12px; background: #102a43;
      color: white; border: none; border-radius: 6px;
      font-weight: bold; cursor: pointer;
    }
    button:hover { background: #243b53; }
    .error { color: #e53e3e; font-size: 14px; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
<div class="login-box">
  <h2>🔐 QUẢN TRỊ VIÊN</h2>
  <form method="post">
    <input name="username" placeholder="Tên đăng nhập" required>
    <input name="password" type="password" placeholder="Mật khẩu" required>
    <button type="submit">Đăng nhập</button>
  </form>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <p style="text-align: center;"><a href="/" style="color: #627d98; font-size: 13px;">Quay về máy chấm công</a></p>
</div>
</body>
</html>
