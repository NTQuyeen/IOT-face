<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhân viên</title>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
<div class="top-bar">
    <h2>💼 QUẢN LÝ NHÂN SỰ</h2>
    <div class="nav">
        <a href="/attendance" class="nav-btn">📋 Bảng công</a>
        <a href="/admin/add-student" class="nav-btn">➕ Thêm nhân viên</a>
        <a href="/logout" class="logout">Thoát</a>
    </div>
</div>

<h1>👥 Danh sách nhân viên chính thức</h1>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>Họ và Tên</th>
                <th>Dữ liệu khuôn mặt</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
        {% for s in students %}
        <tr>
            <td>{{ s }}</td>
            <td><span style="font-size: 12px; color: #666;">Đã đăng ký</span></td>
            <td>
                <a href="/admin/edit-student/{{ s }}" class="nav-btn" style="background:#48bb78">✏️ Sửa tên</a>
                <a href="/admin/delete-student/{{ s }}" class="logout" onclick="return confirm('Xóa dữ liệu nhân viên này?')">🗑 Xóa</a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
